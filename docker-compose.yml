# docker-compose.yml
version: '3.8'

services:
  interviewcopilot:
    build: .
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - ./outputs:/app/outputs
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped